# ── promotion-service ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-promotion-service
  namespace: circleguard-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-promotion-service
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: circleguard-promotion-service
    spec:
      containers:
        - name: circleguard-promotion-service
          image: jrivera340/circleguard-promotion-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8088
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.docker.internal:5432/circleguard_promotion"
            - name: SPRING_DATASOURCE_USERNAME
              value: "admin"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "password"
            - name: SPRING_FLYWAY_REPAIR_ON_MIGRATE
              value: "true"
            - name: SPRING_NEO4J_URI
              value: "bolt://host.docker.internal:7687"
            - name: SPRING_NEO4J_AUTHENTICATION_PASSWORD
              value: "password"
            - name: SPRING_DATA_REDIS_HOST
              value: "host.docker.internal"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "host.docker.internal:9092"
            - name: JWT_SECRET
              value: "my-super-secret-dev-key-32-chars-long-12345678"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info"
          resources:
            requests:
              memory: "768Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-promotion-service
  namespace: circleguard-dev
spec:
  selector:
    app: circleguard-promotion-service
  ports:
    - port: 8088
      targetPort: 8088
      nodePort: 30088
  type: LoadBalancer
---
