apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: circleguard-dev

resources:
  - ../../base

namePrefix: ""

commonLabels:
  environment: dev

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      labelSelector: "app in (circleguard-auth-service,circleguard-identity-service,circleguard-form-service,circleguard-promotion-service,circleguard-gateway-service,circleguard-notification-service)"

images:
  - name: jrivera340/circleguard-auth-service
    newTag: latest
  - name: jrivera340/circleguard-identity-service
    newTag: latest
  - name: jrivera340/circleguard-form-service
    newTag: latest
  - name: jrivera340/circleguard-promotion-service
    newTag: latest
  - name: jrivera340/circleguard-gateway-service
    newTag: latest
  - name: jrivera340/circleguard-notification-service
    newTag: latest
