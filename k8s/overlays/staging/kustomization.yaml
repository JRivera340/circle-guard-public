apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: circleguard-staging

resources:
  - ../../base

commonLabels:
  environment: staging

patches:
  # Scale stateless services to 2 replicas in staging
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: circleguard-auth-service
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: circleguard-gateway-service
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: circleguard-form-service

images:
  - name: jrivera340/circleguard-auth-service
    newTag: latest
  - name: jrivera340/circleguard-identity-service
    newTag: latest
  - name: jrivera340/circleguard-form-service
    newTag: latest
  - name: jrivera340/circleguard-promotion-service
    newTag: latest
  - name: jrivera340/circleguard-gateway-service
    newTag: latest
  - name: jrivera340/circleguard-notification-service
    newTag: latest
